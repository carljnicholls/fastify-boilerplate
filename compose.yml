services:
    redis:
        image: redis:alpine
        ports:
            - "${REDIS_PORT}:6379"
        volumes:
            - redis_data:/data
        restart: always


    db:
        image: postgres:18-alpine
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
        restart: always


volumes:
    redis_data:
    postgres_data:
