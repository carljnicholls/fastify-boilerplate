info:
  name: mqtt
  type: http
  seq: 3

http:
  method: GET
  url: http://127.0.0.1:8080/api/v1/health/mqtt
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function () {
          try {
            expect(res.getStatus()).to.equal(200);
            const body = res.getBody();
            expect(body.connected).to.equal(true);
            expect(body.reconnecting).to.equal(false);
            expect(body.client_id).to.not.be.null;
          }
          catch ( e) {
            console.error(e)
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
