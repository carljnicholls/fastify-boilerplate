info:
  name: 3 update user
  type: http
  seq: 3

http:
  method: PUT
  url: http://localhost:8080/api/v1/user/019dd3e7-d881-75a6-8511-82bc4735cd5e
  body:
    type: json
    data: |+
      {
        "username": "terry", 
        "first_name": "terry", 
        "last_name": "three-toes", 
        "email": "terry@twotoes.com",
        "password": "password" 
      }

  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const user = JSON.parse(bru.getVar("user"));
        // console.log('user',bru.getVar("user"))



        user.first_name = 'terry';

        req.setBody(user);
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setVar("user", JSON.stringify(data))
    - type: tests
      code: |-
        test("test name", function () {
          const user = JSON.parse(bru.getVar("user"));
          user.first_name = 'terry';
        //   console.log('tt', user)
        //   console.log('body',res.getBody())
          
          expect(JSON.stringify(res.getBody())).to.equal(JSON.stringify(user));
          
                 
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
