          content:
            application/json:
              schema:
                type: object
                required:
                  - username
                  - email
                properties:
                  user_id:
                    format: uuid
                    type: string
                  username:
                    minLength: 1
                    maxLength: 255
                    type: string
                  email:
                    format: email
                    maxLength: 255
                    type: string
                  first_name:
                    anyOf:
                      - maxLength: 255
                        type: string
                      - type: "null"
                  last_name:
                    anyOf:
                      - maxLength: 255
                        type: string
                      - type: "null"
        "404":
