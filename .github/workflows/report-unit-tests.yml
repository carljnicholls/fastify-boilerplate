name: CI - Report Results
on:
    workflow_run:
        workflows: [Run Tests]
        types:
            - completed

jobs:
    report:
        runs-on: ubuntu-latest
        # Required for the action to post comments and create check runs
        permissions:
            checks: write
            pull-requests: write
            contents: read
            issues: write

        # Do not run if the triggering workflow was cancelled
        if: github.event.workflow_run.conclusion != 'cancelled'

        steps:
            - name: Download Test Results
              uses: actions/download-artifact@v4
              with:
                  name: junit-results
                  path: test-results # Download into a specific folder
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Download Event File
              uses: actions/download-artifact@v4
              with:
                  name: event-file
                  path: event-data # Download into a specific folder
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
              continue-on-error: true

            - name: Parse PR Number
              id: pr_number
              uses: actions/github-script@v7
              with:
                script: |
                  const fs = require('fs');
                  const event = JSON.parse(fs.readFileSync('event-data/event.json', 'utf8'));
                  return event.pull_request ? event.pull_request.number : null;
                result-encoding: string

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action@v2
              with:
                  commit: ${{ github.event.workflow_run.head_sha }}
                  # Path logic: artifact-folder/filename
                  event_file: event-data/event.json
                  event_name: ${{ github.event.workflow_run.event }}
                  files: "test-results/**/*.xml"

            - name: Download Coverage Results
              uses: actions/download-artifact@v4
              with:
                  name: coverage-results
                  path: coverage-results
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
              continue-on-error: false


            - name: DEBUG - List Downloaded Files
              run: |
                echo "=== DEBUG: Listing all files in workspace ==="
                find . -type f -name "*.xml" 2>/dev/null || true
                echo ""
                echo "=== DEBUG: Listing coverage-results directory ==="
                if [ -d "coverage-results" ]; then
                  ls -laR coverage-results/
                else
                  echo "coverage-results directory does not exist!"
                fi
                echo ""
                echo "=== DEBUG: Searching for cobertura files ==="
                find . -name "*cobertura*" 2>/dev/null || true
                echo ""
                echo "=== DEBUG: File sizes ==="
                find . -name "*.xml" -exec ls -lh {} \; 2>/dev/null || true
              continue-on-error: true




            - name: Publish Test Coverage
              uses: irongut/CodeCoverageSummary@v1.3.0
              with:
                  filename: "coverage-results/**/cobertura-coverage.xml"
                  badge: true
                  fail_below_min: false
                  format: markdown
                  hide_branch_rate: false
                  hide_complexity: false
                  indicators: true
                  output: both
                  thresholds: "60 80"
              continue-on-error: false



            - name: DEBUG - Check Output Files
              run: |
                echo "=== DEBUG: Checking for generated output files ==="
                ls -la *.md 2>/dev/null || echo "No .md files found"
                if [ -f "code-coverage-results.md" ]; then
                  echo "=== Content of code-coverage-results.md ==="
                  cat code-coverage-results.md
                else
                  echo "code-coverage-results.md was not created"
                fi
                if [ -f "coverage-results.md" ]; then
                  echo "=== Content of coverage-results.md ==="
                  cat coverage-results.md
                fi
              continue-on-error: true




            - name: Add Coverage PR Comment
              uses: marocchino/sticky-pull-request-comment@v2
              if: steps.pr_number.outputs.result != 'null'
              with:
                recreate: true
                number: ${{ steps.pr_number.outputs.result }}
                path: code-coverage-results.md
              continue-on-error: false